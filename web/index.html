<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Punk Town</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: linear-gradient(160deg, #aee6ff 0%, #cdeeb0 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: Calibri, system-ui, sans-serif; color: #4a5a38;
  }
  h1 {
    margin: 0 0 10px; font-weight: 800; letter-spacing: 3px; font-size: 32px;
    color: #3f8f3a; text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.12);
  }
  canvas {
    background: #6cbf4a;
    image-rendering: pixelated;
    border-radius: 6px;
    box-shadow: 0 10px 30px rgba(60,120,40,0.35), 0 0 0 3px #fff;
    max-width: 100vw; max-height: 78vh;
    touch-action: none;
  }
  p { margin: 12px 0 0; font-size: 13px; color: #5a6a48; max-width: 760px; text-align: center; }
  /* phones: maximise the canvas, hide chrome */
  @media (max-width: 820px), (pointer: coarse) {
    html, body { overflow: hidden; }
    body { justify-content: center; padding: 0; background: #000; }
    h1, p { display: none; }
    canvas { max-width: none; max-height: none; border-radius: 0; box-shadow: none; }
  }
  b { color: #3f7a2f; }
  kbd {
    background:#fff;border:1px solid #b9d9a0;border-radius:4px;
    padding:1px 6px;font-family:inherit;color:#4a5a38;box-shadow:0 1px 0 #cfe3bc;
  }
</style>
</head>
<body>
  <h1>☀ PUNK TOWN</h1>
  <canvas id="game" width="760" height="600"></canvas>
  <p><kbd>↑↓←→</kbd> / <kbd>WASD</kbd> рух &nbsp;·&nbsp; <kbd>Shift</kbd> біг &nbsp;·&nbsp; <kbd>click</kbd> / <kbd>F</kbd> стрілянина &nbsp;·&nbsp; <kbd>1</kbd>–<kbd>4</kbd> зброя &nbsp;·&nbsp; <kbd>Esc</kbd> пауза &nbsp;·&nbsp; <kbd>M</kbd> музика<br>
     Виконай <b>3 завдання</b> (список угорі зліва) — щоразу <b>нова мапа</b>. Відстрілюй зомбі (випадає зброя), хапай <b>ящики набоїв</b>, лікуйся <b>ДОДОМУ</b>.</p>
  <script src="mapgen.js"></script>
  <script src="sprites.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
